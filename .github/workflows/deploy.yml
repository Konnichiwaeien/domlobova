name: Deploy Domlobova

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # ==============================================================================
            # 1. Настройка окружения и строгий режим выполнения
            # ==============================================================================
            set -euo pipefail
            cd /home/apps/domlobova

            # ==============================================================================
            # 2. Обновление кода из репозитория
            # ==============================================================================
            echo "🔄 Обновление кода"
            git fetch --prune
            git pull --ff-only origin master
            echo "✅ Код успешно обновлен!"

            # ==============================================================================
            # 3. Настройка Node.js через nvm
            # ==============================================================================
            echo "🚀 Активация Node.js через nvm..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            echo "ℹ️ Версия Node.js: $(node -v)"
            echo "ℹ️ Версия npm: $(npm -v)"

            # ==============================================================================
            # 4. Установка зависимостей и сборка проекта
            # ==============================================================================
            echo "🔧 Установка production-зависимостей..."
            npm ci

            echo "Удаление прошлой сборки"
            rm -rf .next

            echo "🏗️ Сборка проекта..."
            npm run build
            echo "✅ Сборка успешно завершена!"

            # ==============================================================================
            # 5. Работа с PM2 через ecosystem.config.js
            # ==============================================================================
            echo "🚀 Настройка PM2 через ecosystem.config.js..."

            # 5.1. Проверяем существование приложения
            if pm2 id domlobova >/dev/null 2>&1; then
                echo "🔄 Приложение существует, выполняем reload..."
                
                # 5.2. Обновляем конфигурацию из ecosystem-файла
                pm2 reload ecosystem.config.js --only domlobova
                
                # 5.3. Сохраняем список процессов для автозапуска
                pm2 save
            else
                echo "⭐ Приложение не найдено, выполняем первый запуск..."
                
                # 5.4. Запускаем приложение по конфигурации
                pm2 start ecosystem.config.js --only domlobova
                
                # 5.5. Настраиваем автозапуск
                pm2 startup
                pm2 save
            fi

            # ==============================================================================
            # 6. Проверка статуса
            # ==============================================================================
            echo "✅ Деплой завершен! Текущий статус:"
            pm2 status domlobova
